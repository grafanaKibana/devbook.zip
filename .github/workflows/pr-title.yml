name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          if printf '%s' "$TITLE" | grep -qE '^(feature|notes|docs|bug|fix|maintenance)!?: .+'; then
            echo "✓ $TITLE"
          else
            echo "::error::PR title must start with 'feature:', 'notes:', 'docs:', 'bug:', 'fix:' or 'maintenance:' (append '!' for a breaking/major change, e.g. 'feature!:'). Got: ${TITLE:-<empty>}"
            exit 1
          fi
