name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail

          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)

          if [ -z "$LAST_TAG" ]; then
            NEXT="v1.0.0"
            BUMP=initial
            echo "No previous tag; initial release $NEXT."
          else
            RANGE="${LAST_TAG}..HEAD"
            VER="${LAST_TAG#v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
            echo "Last tag: $LAST_TAG"

            SUBJECTS=$(git log ${RANGE} --no-merges --format='%s' || true)

            BUMP=none
            if printf '%s\n' "$SUBJECTS" | grep -qE '^(notes|feat)(\([^)]+\))?:'; then
              BUMP=minor
            elif printf '%s\n' "$SUBJECTS" | grep -qE '^(fix|bump)(\([^)]+\))?:'; then
              BUMP=patch
            fi

            case "$BUMP" in
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
              none)  echo "No release-worthy commits; skipping." ;;
            esac

            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Computed: bump=$BUMP next=$NEXT"

      - name: Generate release notes
        if: steps.version.outputs.bump != 'none'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.version.outputs.next }} --unreleased --strip header -o RELEASE_NOTES.md

      - name: Create tag + GitHub Release
        if: steps.version.outputs.bump != 'none'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          gh release create "$NEXT" \
            --target "$GITHUB_SHA" \
            --title "$NEXT" \
            --notes-file RELEASE_NOTES.md \
            --latest
