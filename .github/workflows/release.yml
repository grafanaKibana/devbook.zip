name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail

          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -z "$LAST_TAG" ]; then
            RANGE=""
            B=0; C=0
            echo "No previous tag; starting from 0."
          else
            RANGE="${LAST_TAG}..HEAD"
            VER="${LAST_TAG#v}"
            B=$(echo "$VER" | cut -d. -f2)
            C=$(echo "$VER" | cut -d. -f3)
            echo "Last tag: $LAST_TAG"
          fi
          YY=$(date +%y)

          SUBJECTS=$(git log ${RANGE} --no-merges --format='%s' || true)

          BUMP=none
          if printf '%s\n' "$SUBJECTS" | grep -qE '^(notes|feat)(\([^)]+\))?:'; then
            BUMP=minor
          elif printf '%s\n' "$SUBJECTS" | grep -qE '^fix(\([^)]+\))?:'; then
            BUMP=patch
          fi

          case "$BUMP" in
            minor) B=$((B + 1)) ;;
            patch) C=$((C + 1)) ;;
            none)  echo "No release-worthy commits; skipping." ;;
          esac

          NEXT="v${YY}.${B}.${C}"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Computed: bump=$BUMP next=$NEXT"

      - name: Generate release notes
        if: steps.version.outputs.bump != 'none'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.version.outputs.next }} --unreleased --strip header -o RELEASE_NOTES.md

      - name: Create tag + GitHub Release
        if: steps.version.outputs.bump != 'none'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          gh release create "$NEXT" \
            --target "$GITHUB_SHA" \
            --title "$NEXT" \
            --notes-file RELEASE_NOTES.md \
            --latest
