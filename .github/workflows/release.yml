name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # The merged PR's title decides a MAJOR (its `!`); commits decide the
          # rest. Look the title up from the pushed merge commit.
          TITLE=""
          for _ in 1 2 3; do
            TITLE=$(gh api "repos/$REPO/commits/$GITHUB_SHA/pulls" --jq '.[0].title // ""' 2>/dev/null || true)
            [ -n "$TITLE" ] && break
            sleep 5
          done
          echo "Merged PR title: ${TITLE:-<none>}"
          bash .github/scripts/next-version.sh "$TITLE" | tee -a "$GITHUB_OUTPUT"

      - name: Generate release notes
        if: steps.version.outputs.bump != 'none'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.version.outputs.next }} --unreleased --strip header -o RELEASE_NOTES.md

      - name: Create tag + GitHub Release
        if: steps.version.outputs.bump != 'none'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          gh release create "$NEXT" \
            --target "$GITHUB_SHA" \
            --title "$NEXT" \
            --notes-file RELEASE_NOTES.md \
            --latest
