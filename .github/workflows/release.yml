name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: bash .github/scripts/next-version.sh auto | tee -a "$GITHUB_OUTPUT"

      - name: Generate release notes
        if: steps.version.outputs.bump != 'none'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.version.outputs.next }} --unreleased --strip header -o RELEASE_NOTES.md

      - name: Create tag + GitHub Release
        if: steps.version.outputs.bump != 'none'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          gh release create "$NEXT" \
            --target "$GITHUB_SHA" \
            --title "$NEXT" \
            --notes-file RELEASE_NOTES.md \
            --latest
