<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eval Report — __DC_TITLE__</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{min-height:100vh;background:#111110}
  #app button{cursor:pointer}
  #app select,#app input{font:inherit}
  ::selection{background:rgba(120,140,200,.25)}
  ::-webkit-scrollbar{height:10px;width:10px}
  ::-webkit-scrollbar-thumb{background:rgba(128,128,128,.35);border-radius:6px}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DATA = "__DC_DATA__";

/* ============================ tiny helpers ============================ */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const fmt=(v,d)=> (v==null||isNaN(v)) ? '—' : Number(v).toFixed(d===undefined?3:d);
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function css(o){return Object.keys(o).map(k=>{const p=k.charAt(0)==='-'?k:k.replace(/[A-Z]/g,m=>'-'+m.toLowerCase());return p+':'+o[k];}).join(';');}
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function hexRGB(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function hexTint(hex,a){const c=hexRGB(hex);return `rgba(${c[0]},${c[1]},${c[2]},${a})`;}
function lum(hex){const c=hexRGB(hex);return (0.2126*c[0]+0.7152*c[1]+0.0722*c[2])/255;}

/* ===== one semantic scale (bad → good), theme-aware. Drives rating chips AND the heatmap. ===== */
function semAnchors(){return state.mode==='dark'
  ? ['#e05a45','#e8924a','#ecc056','#5cc07e','#37ab66']
  : ['#c23a29','#df7e2c','#eaae37','#4aa65d','#2c8b50'];}
function hexToHsl(hex){let [r,g,b]=hexRGB(hex);r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h=0,s=0,l=(mx+mn)/2;const d=mx-mn;if(d>0){s=l>0.5?d/(2-mx-mn):d/(mx+mn);if(mx===r)h=((g-b)/d+(g<b?6:0));else if(mx===g)h=((b-r)/d+2);else h=((r-g)/d+4);h*=60;}return [h,s,l];}
function hslToRgb(h,s,l){h=((h%360)+360)%360;const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;let r=0,g=0,b=0;if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}return [Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)];}
function ratingIdx(r){const m={Unacceptable:0,Poor:1,Average:2,Good:3,Exceptional:4,Inconclusive:2};return m[r]==null?2:m[r];}
function ratingColor(r){return semAnchors()[ratingIdx(r)];}
function ratingTextOn(r){return lum(ratingColor(r))>0.6?'#16140c':'#f7f4ee';}
function badge(r){return {background:ratingColor(r),color:ratingTextOn(r)};}
function tint(r){return hexTint(ratingColor(r),state.mode==='dark'?0.20:0.13);}
function ratingFracColor(v){return ratingColor(rate(v));}
function heatHslAnchors(){return semAnchors().map(h=>hexToHsl(h));}
function heatRGBraw(s){s=clamp(s,0,1);const A=heatHslAnchors();const x=s*(A.length-1),i=Math.floor(x),f=x-i;const a=A[i],b=A[Math.min(i+1,A.length-1)];return hslToRgb(a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f);}
function heatColorRGB(t){t=clamp(t,0,1);const s=Math.pow(t,1);return heatRGBraw(0.06+s*0.9);}
function heat(t){const c=heatColorRGB(t);return `rgb(${c[0]},${c[1]},${c[2]})`;}
function heatTxtOn(t){const c=heatColorRGB(t);const L=(0.2126*c[0]+0.7152*c[1]+0.0722*c[2])/255;return L>0.58?'#1a1407':'#f7f4ee';}
function heatGradient(){const N=8,s=[];for(let k=0;k<=N;k++){const c=heatColorRGB(k/N);s.push(`rgb(${c[0]},${c[1]},${c[2]}) ${Math.round(k/N*100)}%`);}return 'linear-gradient(90deg,'+s.join(',')+')';}

/* ===== rating thresholds ===== */
function RATINGS(){return ['Exceptional','Good','Average','Poor','Unacceptable'];}
function rate(v){return v>=0.85?'Exceptional':v>=0.72?'Good':v>=0.55?'Average':v>=0.4?'Poor':'Unacceptable';}
function rateEmpty(v){return v<0.012?'Exceptional':v<0.03?'Good':v<0.06?'Average':v<0.1?'Poor':'Unacceptable';}
function ratingNum(v){return v>=4.5?'Exceptional':v>=3.5?'Good':v>=2.5?'Average':v>=1.5?'Poor':'Unacceptable';}
function ratingSeverity(s){return s<=1?'Exceptional':s<=2?'Good':s<=3?'Average':s<=5?'Poor':'Unacceptable';}
function sevLabel(s){return s<=1?'Very low':s<=3?'Low':s<=5?'Medium':'High';}
function groupColor(g){return {Agent:'#6d8df0',Quality:'#33908d',Safety:'#d98a2b',Stats:'#8a887c',Retrieval:'#33908d'}[g]||'#8a887c';}

/* ===== theme (terminal only) ===== */
function theme(){
  const dark=state.mode==='dark';
  const mono="'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace";
  const t = dark
    ? {bg:'#111110',panel:'#181817',panel2:'#201f1c',line:'#2c2b27',line2:'#3c3a34',fg:'#e9e8df',fg2:'#a4a297',fg3:'#6f6d62',accent:'#e9e8df',accentFg:'#111110'}
    : {bg:'#f1f0ea',panel:'#fbfaf5',panel2:'#e9e8df',line:'#d8d6ca',line2:'#c3c1b3',fg:'#1a1a16',fg2:'#56544b',fg3:'#8a887c',accent:'#1a1a16',accentFg:'#fbfaf5'};
  t.fhead=mono;t.fbody=mono;t.fnum=mono;t.rad='2px';t.rad2='2px';t.shadow='none';t.shadowLg='none';t.warn=dark?'#d8b24a':'#b8902a';
  t.barbg=dark?'rgba(20,20,18,.72)':'rgba(251,250,245,.78)';
  t.ok=dark?'#4ec77d':'#1d8a4a';
  t.danger=dark?'#ef6a52':'#cf3a24';
  return t;
}
function rootStyle(){const t=theme();const o={};Object.keys(t).forEach(k=>o['--'+k]=t[k]);o.minHeight='100vh';o.display='flex';o.alignItems='stretch';o.background='var(--bg)';o.color='var(--fg)';o.fontFamily='var(--fbody)';o.transition='background .25s, color .25s';o['-webkit-font-smoothing']='antialiased';return o;}
function segBtn(active){return {fontFamily:'var(--fbody)',fontSize:'12px',fontWeight:'600',padding:'5px 10px',border:'none',borderRadius:'2px',cursor:'pointer',whiteSpace:'nowrap',background:active?'var(--accent)':'transparent',color:active?'var(--accentFg)':'var(--fg2)',transition:'background .12s'};}
const STRIPH=28; /* comfortable density */

/* render a segmented group of buttons that dispatch (act,val) */
function segGroup(act, items){return items.map(it=>`<button data-act="${act}" data-val="${esc(it.val)}" style="${css(segBtn(it.on))}">${esc(it.label)}</button>`).join('');}

/* ============================ retrieval metric registry (data-driven) ============================ */
const METRICS=DATA.metrics||[];
const MM={}; METRICS.forEach(m=>MM[m.key]=m);
const SELECTOR_METRICS=METRICS.filter(m=>m.inSelector);
const DETAIL_METRICS=METRICS.filter(m=>m.inDetail);
const GATE=(METRICS.find(m=>m.gate)||{key:'recall'}).key;
function getM(cfg,key){const v=cfg.levels[state.rLevel][key];return (v&&typeof v==='object')?v:{v};}
function rerankerLong(r){return r.replace(/([A-Z])/g,' $1').trim();}
/* drill evidence matching */
function parseLabel(s){const i=s.indexOf('#');return {note:i>=0?s.slice(0,i):s,head:i>=0?s.slice(i+1):'',raw:s};}
function norm(s){return String(s==null?'':s).trim().toLowerCase();}
function matchExp(e,r){if(norm(e.note)!==norm(r.note))return false;if(!r.head)return true;return e.heading?norm(e.heading)===norm(r.head):true;}

const R = {configs:DATA.configs,winnerId:DATA.winnerId,run:DATA.run,runs:DATA.runs,perCase:DATA.perCase,cases:DATA.cases,metricDefs:DATA.metricDefs,hasDataset:DATA.hasDataset};

/* ====================================================================== */
/* ============ JUDGE DOMAIN (generic over scenario categories) ========= */
/* Non-retrieval categories (e.g. AnswerAgent) arrive fully built in DATA.judge */
/* from the C# generator — values, ratings, reasons, diagnostics, messages.  */
/* This template only *styles* them; nothing judge-specific is hard-coded.   */
/* ====================================================================== */
const JUDGE = DATA.judge||[];
function catSpec(id){return JUDGE.find(c=>c.id===id)||JUDGE[0];}
/* retrieval-domain metric tooltips (judge metrics carry their own .desc) */
function metricDesc(key){return {
  recall:'RecallAtR — coverage of expected evidence within a per-query budget of R (the number of expected chunks).',
  ndcg:'NDCG@10 — graded ranking quality with a rank discount over the top 10 results.',
  hit:'HitRate@1 — fraction of queries whose top-1 result is an expected evidence chunk.',
  mrr:'MRR@10 — reciprocal rank of the first relevant evidence within the top 10.',
  map:'MAP@10 — mean average precision across all relevant evidence within the top 10.',
  empty:'EmptyRate — fraction of queries returning no usable evidence (lower is better).',
  score:'ScoreAverage — mean retrieval score, a diagnostic signal.'
}[key]||'Evaluator metric reported by the result set.';}
/* generic kind→heat-position and kind→rating, for lite per-run values */
function goodOf(md,v){return md.kind==='severity'?1-v/7:md.kind==='fraction'?v:(v-1)/4;}
function ratingOf(md,v){return md.kind==='severity'?ratingSeverity(v):md.kind==='fraction'?rate(v):md.info?'—':ratingNum(v);}
/* style the raw conversation messages emitted by the generator */
function styleMessages(msgs){
  const th=theme(),isDark=state.mode==='dark';
  const roleStyle=(bg,fg,bd)=>({fontFamily:'var(--fnum)',fontSize:'10px',fontWeight:'700',letterSpacing:'.06em',textTransform:'uppercase',padding:'1px 7px',borderRadius:'2px',background:bg,color:fg,border:'1px solid '+(bd||'var(--line)')});
  const body={fontSize:'12.5px',lineHeight:'1.5',color:'var(--fg2)'};
  const wrap={border:'1px solid var(--line)',borderRadius:'2px',padding:'10px 12px',background:'var(--panel2)'};
  const userRoles={user:1,question:1,source:1,query:1};
  const systemRoles={system:1};
  return (msgs||[]).map(m=>{
    let rs,w=wrap,bs=body,align;
    if(m.isTool){rs=roleStyle(hexTint(th.warn,isDark?0.20:0.14),th.warn,hexTint(th.warn,0.4));bs={...body,fontFamily:'var(--fnum)',fontSize:'11.5px'};align='center';}
    else if(systemRoles[m.role]){rs=roleStyle(hexTint('#8a887c',isDark?0.18:0.12),'var(--fg2)','var(--line2)');align='center';}
    else if(userRoles[m.role]){rs=roleStyle(hexTint(th.accent,isDark?0.18:0.12),'var(--fg)','var(--line2)');if(m.role==='source')bs={...body,fontFamily:'var(--fnum)',fontSize:'11.5px',whiteSpace:'pre-wrap'};if(m.role==='user')w={...wrap,background:'var(--panel)'};align='left';}
    else{rs=roleStyle(hexTint(th.ok,isDark?0.18:0.12),th.ok,hexTint(th.ok,0.4));align='right';}
    return {role:m.role,isTool:m.isTool,tool:m.tool,text:m.text,roleStyle:rs,wrap:w,bodyStyle:bs,align};
  });
}

/* ============================ shared drill assembly ============================ */
function buildMetricCard(m){
  const th=theme(),isDark=state.mode==='dark';
  return {name:m.name,valStr:m.valStr,rating:m.rating,reason:m.reason,kindLabel:m.kindLabel,desc:m.desc||metricDesc(m.key||m.name),
    groupDot:{width:'8px',height:'8px',borderRadius:'50%',background:groupColor(m.group),display:'inline-block',flex:'none'},
    cardStyle:{border:'1px solid '+(m.failed?th.danger:'var(--line)'),borderRadius:'2px',padding:'11px 13px',background:m.failed?hexTint(th.danger,isDark?0.07:0.04):'var(--panel2)'},
    chip:m.info?{display:'none'}:{display:'inline-block',padding:'1px 7px',borderRadius:'2px',fontSize:'10px',fontWeight:'700',...badge(m.rating)},
    hasContext:m.context&&m.context.length>0,context:m.context||[],
    hasDiag:m.diagnostics&&m.diagnostics.length>0,diagnostics:(m.diagnostics||[]).map(d=>diagStyle(d)),
    metadata:m.metadata||[]};
}
function diagStyle(d){
  const th=theme(),isDark=state.mode==='dark';
  const map={error:{c:th.danger,icon:'✕'},warning:{c:th.warn,icon:'⚠'},informational:{c:'var(--fg3)',icon:'ℹ'}};
  const m=map[d.severity]||map.informational;
  return {message:d.message,icon:m.icon,style:{display:'flex',gap:'7px',alignItems:'flex-start',fontFamily:'var(--fnum)',fontSize:'10.5px',lineHeight:'1.45',padding:'5px 9px',borderRadius:'2px',background:hexTint(d.severity==='informational'?'#8a887c':m.c,isDark?0.16:0.10),color:d.severity==='informational'?'var(--fg2)':m.c,border:'1px solid '+hexTint(d.severity==='informational'?'#8a887c':m.c,0.4)}};
}

/* ============================ state ============================ */
const RJ_RUNS=R.runs||[];
const rBase=RJ_RUNS[0]?RJ_RUNS[RJ_RUNS.length-1].run.id:DATA.run.id;
const rBaseA=(RJ_RUNS.find(x=>x.run.id!==DATA.run.id)||{run:{}}).run.id||DATA.run.id;
const jr=(JUDGE[0]&&JUDGE[0].runs)||[];
const jHist0=(JUDGE[0]&&JUDGE[0].metricDefs.find(m=>!m.info))||{key:'intent'};
// Follow the OS theme by default. `modeUserSet` flips once the user clicks the toggle,
// after which we stop tracking the system preference for the rest of the session.
const prefersDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
const state={
  cat:'rag', tab:'run', mode:prefersDark?'dark':'light', modeUserSet:false,
  search:'', failedOnly:false, diff:'all', expanded:{}, drillLimit:25,
  rMetric:'recall', rLevel:'chunk', rSortKey:'recall', rSortDir:'desc',
  rDrillCfg:DATA.winnerId||(DATA.configs[0]&&DATA.configs[0].id),
  rHistMetric:'recall', rHistLevel:'chunk', rHistAgg:'best',
  rCmpA:rBaseA, rCmpB:DATA.run.id, rCmpLevel:'chunk', rCmpMetric:'recall',
  jGroup:'all', jSortKey:'__fail', jSortDir:'desc',
  jHistMetric:jHist0.key, jHistAgg:'mean',
  jCmpA:jr[0]?jr[0].run.id:'', jCmpB:jr[jr.length-1]?jr[jr.length-1].run.id:'', jCmpMetric:jHist0.key,
  _focus:null
};
const HAS_RUNS = RJ_RUNS.length>=2;

/* ============================ render orchestration ============================ */
function render(){
  const root=document.getElementById('app');
  root.setAttribute('style', css(rootStyle()));
  const dom = state.cat==='rag' ? renderRetrieval() : renderJudge(catSpec(state.cat));
  root.innerHTML = sidebar() + main(dom);
  wire();
}

function sidebar(){
  // Categories are the top-level MEAI ScenarioName groups: RAG.Search (real) + the
  // judge categories emitted in DATA.judge. Same icon for every category, per design.
  const ret={id:'rag',label:(R.run.scenarioName||'RAG.Search'),sub:'retrieval quality',kind:'Retrieval'};
  const cats=[ret,...JUDGE.map(c=>({id:c.id,label:c.label,sub:c.sub||'LLM-as-judge',kind:c.kind}))];
  const items=cats.map(c=>{const active=state.cat===c.id;
    const btnStyle={display:'flex',alignItems:'center',gap:'10px',padding:'9px 11px',border:'none',borderRadius:'2px',cursor:'pointer',textAlign:'left',width:'100%',background:active?'var(--accent)':'transparent',color:active?'var(--accentFg)':'var(--fg2)'};
    const iconStyle={width:'22px',height:'22px',flex:'none',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',borderRadius:'2px',background:active?hexTint('#ffffff',0.18):'var(--panel2)',color:active?'var(--accentFg)':groupColor(c.kind==='Retrieval'?'Retrieval':'Agent')};
    const kindStyle={marginLeft:'auto',fontFamily:'var(--fnum)',fontSize:'8.5px',fontWeight:'700',letterSpacing:'.04em',textTransform:'uppercase',color:active?'var(--accentFg)':'var(--fg3)',opacity:active?0.85:0.7,whiteSpace:'nowrap'};
    const kindLabel=c.kind.replace('Quality','').replace('Retrieval','Search')||c.kind;
    return `<button data-act="nav" data-val="${c.id}" style="${css(btnStyle)}"><span style="${css(iconStyle)}">◆</span><span style="display:flex;flex-direction:column;min-width:0"><span style="font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.label)}</span><span style="font-family:var(--fnum);font-size:9.5px;color:${active?'var(--accentFg)':'var(--fg3)'};opacity:${active?0.8:1};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.sub)}</span></span><span style="${css(kindStyle)}">${esc(kindLabel)}</span></button>`;
  }).join('');
  return `<aside style="width:236px;flex:none;position:sticky;top:0;height:100vh;border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column">
    <div style="padding:18px 16px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px"><span style="width:11px;height:11px;border-radius:3px;background:var(--accent);display:inline-block;flex:none"></span><div style="min-width:0"><div style="font-family:var(--fhead);font-weight:700;font-size:13px;letter-spacing:-.01em;line-height:1.15;white-space:nowrap">Evaluation Report</div><div style="font-family:var(--fnum);font-size:10px;color:var(--fg3);margin-top:2px">MEAI · generic</div></div></div>
    <div style="padding:14px 14px 7px;font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--fg3)">Scenario categories</div>
    <nav style="flex:1;overflow-y:auto;padding:0 10px 10px;display:flex;flex-direction:column;gap:3px">${items}</nav>
    <div style="padding:11px;border-top:1px solid var(--line)"><button data-act="mode" style="width:100%;display:flex;align-items:center;justify-content:center;gap:7px;font-family:var(--fbody);font-size:11.5px;font-weight:600;padding:8px;border:1px solid var(--line2);background:var(--panel2);color:var(--fg2);border-radius:2px;cursor:pointer"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block"></span>${state.mode==='dark'?'Dark':'Light'}</button></div>
  </aside>`;
}

function main(dom){
  const S=state;
  const tabs=[['run','Single run'],['hist','History'],['cmp','Cross-run comparison']].map(([k,l])=>{
    const st={fontFamily:'var(--fbody)',fontSize:'13px',fontWeight:'600',padding:'10px 4px',marginRight:'24px',border:'none',borderBottom:'2px solid '+(S.tab===k?'var(--accent)':'transparent'),background:'transparent',color:S.tab===k?'var(--fg)':'var(--fg3)',cursor:'pointer'};
    return `<button data-act="tab" data-val="${k}" style="${css(st)}">${l}</button>`;
  }).join('');
  const body = S.tab==='hist'? renderHistory(dom.history)
    : S.tab==='cmp'? renderComparison(dom.comparison)
    : dom.runHtml;
  return `<main style="flex:1;min-width:0;display:flex;flex-direction:column">
    <div style="position:sticky;top:0;z-index:40;padding:16px 30px 0;background:var(--barbg);backdrop-filter:saturate(1.4) blur(12px);border-bottom:1px solid var(--line)">
      <div style="display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:12px"><div style="min-width:0;flex:1"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span style="font-family:var(--fhead);font-weight:700;font-size:21px;letter-spacing:-.015em;line-height:1.1;white-space:nowrap">${esc(dom.headerTitle)}</span><span style="font-family:var(--fnum);font-size:10.5px;color:var(--fg3);border:1px solid var(--line2);border-radius:2px;padding:3px 8px;white-space:nowrap">${esc(dom.headerTag)}</span>${dom.demo?'<span style="font-family:var(--fnum);font-size:10.5px;color:var(--warn);border:1px solid '+hexTint(theme().warn,0.5)+';border-radius:2px;padding:3px 8px;white-space:nowrap">⚠ synthetic demo data</span>':''}</div><div style="font-family:var(--fnum);font-size:12px;color:var(--fg3);margin-top:5px">${esc(dom.headerSubtitle)}</div></div></div>
      <div style="display:flex;align-items:center">${tabs}</div>
    </div>
    <div style="max-width:1240px;margin:0 auto;width:100%;padding:24px 30px 90px">${body}</div>
  </main>`;
}

/* ============================ shared drill render ============================ */
function assembleDrill(items,opts){
  const S=state,th=theme(),isDark=S.mode==='dark';
  const sq=(S.search||'').trim().toLowerCase();
  let fs=items.slice();
  if(S.diff!=='all')fs=fs.filter(i=>i.diff===S.diff);
  if(S.failedOnly)fs=fs.filter(i=>!i.pass);
  if(sq)fs=fs.filter(i=>i.searchText.toLowerCase().includes(sq));
  const total=fs.length,limit=S.drillLimit,shownItems=fs.slice(0,limit);
  const diffStyleBase={padding:'2px 9px',borderRadius:'2px',fontSize:'10px',fontWeight:'700',fontFamily:'var(--fnum)',textTransform:'uppercase',letterSpacing:'.05em'};
  const diffStyleMap={easy:{...diffStyleBase,background:hexTint(th.ok,isDark?0.20:0.12),color:th.ok},medium:{...diffStyleBase,background:hexTint(th.warn,isDark?0.22:0.16),color:th.warn},hard:{...diffStyleBase,background:hexTint(th.danger,isDark?0.20:0.12),color:th.danger}};
  const rowsHtml=shownItems.map(q=>{
    const isExp=!!S.expanded[q.id];
    const containerStyle={borderTop:'1px solid var(--line)',borderLeft:'3px solid '+(q.pass?th.ok:th.danger),background:q.pass?'transparent':hexTint(th.danger,isDark?0.06:0.03)};
    const rowStyle={display:'grid',gridTemplateColumns:'1.3fr 1fr',gap:'22px',padding:'12px 18px 12px 26px',cursor:'pointer',position:'relative'};

  }).join('');
  const diffs=segGroup('diff',[['all','All'],['easy','Easy'],['medium','Medium'],['hard','Hard']].map(([v,l])=>({val:v,label:l,on:S.diff===v})));

/* ============================ shared history / comparison render ============================ */
function buildHistory(o){
  const th=theme();const series=o.series,n=series.length,dpv=o.dpv;
  const allLo=Math.min(...series.map(s=>s.mn)),allHi=Math.max(...series.map(s=>s.mx));
  let yLo=allLo,yHi=allHi;const ypad=(yHi-yLo)*0.10||(o.severity?1:0.02);yLo-=ypad;yHi+=ypad;
  const VW=1000,VH=320,PL=58,PR=20,PT=18,PB=46,IW=VW-PL-PR,IH=VH-PT-PB;
  const X=i=>PL+(n<=1?IW/2:i*IW/(n-1)),Y=v=>PT+(1-clamp((v-yLo)/((yHi-yLo)||1),0,1))*IH;
  const f1=v=>Number(v).toFixed(1);
  const ptsLine=series.map((s,i)=>X(i)+','+f1(Y(s.line))).join(' ');
  const ptsMean=series.map((s,i)=>X(i)+','+f1(Y(s.mean))).join(' ');
  const ptsBand=series.map((s,i)=>X(i)+','+f1(Y(s.mx))).concat(series.map((s,i)=>X(i)+','+f1(Y(s.mn))).reverse()).join(' ');
  const gridY=[0,1,2,3,4].map(i=>{const v=yLo+(yHi-yLo)*i/4;return {y:f1(Y(v)),label:fmt(v,dpv)};});
  const dots=series.map((s,i)=>{const prev=i>0?series[i-1].line:null;const reg=prev!==null&&(o.better==='low'?s.line>prev+1e-9:s.line<prev-1e-9);return {cx:f1(X(i)),cy:f1(Y(s.line)),fill:reg?'var(--warn)':'var(--accent)',r:reg?'4.5':'3.5',title:s.run.finished.slice(0,10)+' · '+o.metricLabel+' '+fmt(s.line,dpv)};});
  const xticks=series.map((s,i)=>({show:i%3===0||i===n-1,x:f1(X(i)),label:s.run.finished.slice(5,10)}));
  const markers=o.markerIdx>0?[{x:f1(X(o.markerIdx)),lx:f1(X(o.markerIdx)-6),label:o.markerLabel}]:[];
  const first=series[0].line,last=series[n-1].line,hdelta=last-first;
  const peak=series.reduce((a,b)=>((o.better==='low'?b.line<a.line:b.line>a.line)?b:a));
  const improved=series.filter((s,i)=>i>0&&(o.better==='low'?s.line<series[i-1].line:s.line>series[i-1].line)).length;
  const cards=[
    {k:'First run',v:fmt(first,dpv),sub:series[0].run.finished.slice(0,10),c:'var(--fg2)'},
    {k:'Latest run',v:fmt(last,dpv),sub:series[n-1].run.finished.slice(0,10),c:'var(--fg)'},
    {k:'Net change',v:(hdelta>=0?'+':'−')+fmt(Math.abs(hdelta),dpv),sub:'over '+n+' runs',c:(o.better==='low'?hdelta<0:hdelta>0)?th.ok:th.danger},
    {k:'Peak',v:fmt(peak.line,dpv),sub:peak.run.finished.slice(0,10),c:'var(--accent)'},
    {k:'Runs improved',v:improved+'/'+(n-1),sub:'vs previous run',c:'var(--fg)'}
  ];
  const tableRows=series.map((s,i)=>{const prev=i>0?series[i-1].line:null;const d=prev===null?null:s.line-prev;const up=d!==null&&(o.better==='low'?d<0:d>0);
    return {date:s.run.finished.slice(0,16),c2:o.col2Of(s),val:fmt(s.line,dpv),note:s.run.note,latest:i===n-1,deltaS:d===null?'—':(d>=0?'+':'−')+fmt(Math.abs(d),dpv),deltaCol:d===null?'var(--fg3)':(up?th.ok:th.danger)};}).reverse();
  return {VW,VH,PT,PB,ptsLine,ptsMean,ptsBand,gridY,dots,xticks,markers,cards,tableRows,
    subtitle:o.subtitle,metricLabel:o.metricLabel,col2:o.col2,aggLabel:o.aggLabel,axisNote:o.axisNote,
    hasLevels:!!o.hasLevels,levels:o.levels||[],aggs:o.aggs,metrics:o.metrics};
}

function renderComparison(c){
  if(c.empty) return `<div><div style="font-family:var(--fhead);font-size:22px;font-weight:700;letter-spacing:-.01em;margin-bottom:18px">Cross-run comparison</div><div style="border:1px solid var(--line);border-radius:2px;background:var(--panel);padding:46px 30px;text-align:center"><div style="font-size:24px;color:var(--fg3);margin-bottom:10px">⇄</div><div style="font-size:14px;color:var(--fg2);max-width:460px;margin:0 auto;line-height:1.55">${esc(c.message)}</div></div></div>`;
  const metricBtns=c.metrics.map(a=>`<button data-act="${a.act}" data-val="${esc(a.val)}" style="${css(segBtn(a.on))}">${esc(a.label)}</button>`).join('');
  const lvlBtns=c.hasLevels?`<div style="display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:2px">${c.levels.map(a=>`<button data-act="${a.act}" data-val="${esc(a.val)}" style="${css(segBtn(a.on))}">${esc(a.label)}</button>`).join('')}</div>`:'';
  const opts=c.runOpts.map(o=>`<option value="${esc(o.id)}">${esc(o.label)}</option>`).join('');
  const selA=c.runOpts.map(o=>`<option value="${esc(o.id)}" ${o.id===c.cmpA?'selected':''}>${esc(o.label)}</option>`).join('');

><span style="${css(smBadge(ws.rating))}">${esc(ws.rating)}</span></div><div style="font-family:var(--fnum);font-size:12px;color:var(--fg2);margin-top:5px">95% CI [${fmt(ws.lo)}, ${fmt(ws.hi)}]</div></div></div></div><div style="display:flex;flex-direction:column;gap:12px"><div style="border:1px solid var(--line);border-radius:2px;padding:15px 17px;background:var(--panel)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="width:7px;height:7px;border-radius:50%;background:var(--warn);display:inline-block"></span><span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--fg2)">Read the uncertainty</span></div><div style="font-size:13px;line-height:1.5;color:var(--fg2)">${esc(sig)}</div></div><div style="border:1px solid var(--line);border-radius:2px;padding:15px 17px;background:var(--panel)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block"></span><span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--fg2)">Chunk vs. section</span></div><div style="font-size:13px;line-height:1.5;color:var(--fg2)">${esc(gapText)}</div></div></div></div>`;

  let domLo=Math.min(...vals),domHi=Math.max(...vals);const pad=(domHi-domLo)*0.04||0.01;domLo-=pad;domHi+=pad;

ont-size:11px;color:var(--fg2);margin-top:5px;font-variant-numeric:tabular-nums"><span>${fmt(mm.better==='low'?domHi:domLo)}</span><span>${fmt(mm.better==='low'?domLo:domHi)}</span></div></div><div style="border-top:1px dashed var(--line2);padding-top:12px;display:flex;flex-direction:column;gap:9px"><div style="display:flex;gap:8px"><span style="color:var(--accent);font-weight:700">▸</span><span style="font-size:12px;color:var(--fg2);line-height:1.45">Click any cell to load that configuration into the drill-down below.</span></div><div style="display:flex;gap:8px"><span style="color:var(--accent);font-weight:700">▸</span><span style="font-size:12px;color:var(--fg2);line-height:1.45">On ${esc(mm.label)}, ${esc(bestReranker)} is the strongest reranker on average and ${esc(bestChunker)} the strongest chunker.</span></div></div></div></div></div>`;

  ovData.sort((a,b)=>b.passRate-a.passRate);  // metric rows ordered by pass rate, 100% → 0%
  const ovRows=ovData.map(({md,ms,passRate})=>{
    const mean=ms.reduce((a,m)=>a+m.value,0)/ms.length,meanS=md.kind==='fraction'?fmt(mean,2):fmt(mean,1);
    const cells=order.map(s=>{const m=s.metrics[md.key];return `<div data-act="strip" data-val="${esc(s.id)}" title="${esc(s.name+' — '+md.name+': '+m.valStr+' ('+m.rating+')')}" style="flex:1 1 0;min-width:1px;height:100%;cursor:pointer;background:${heat(m.good)}"></div>`;}).join('');
    return `<div style="display:grid;grid-template-columns:206px 56px minmax(0,1fr) 84px;gap:14px;align-items:center;padding:9px 16px;border-top:1px solid var(--line)"><div style="min-width:0"><div data-act="jSort" data-val="${md.key}" style="display:flex;align-items:center;gap:6px;user-select:none"><span style="width:8px;height:8px;border-radius:50%;background:${groupColor(md.group)};display:inline-block;flex:none"></span><span title="${esc(md.desc)}" style="font-family:var(--fnum);font-size:12.5px;font-weight:700;color:var(--fg);white-space:nowrap;text-decoration:underline dotted;text-decoration-color:var(--line2);text-underline-offset:3px;cursor:help">${esc(md.name)}</span><span style="font-size:9px;color:var(--accent);flex:none;width:9px;cursor:pointer">${arrowFor(md.key)}</span></div><div style="font-family:var(--fnum);font-size:10.5px;color:var(--fg3);margin-top:3px;padding-left:14px">${esc(md.scaleLabel)}</div></div><div style="font-family:var(--fnum);font-size:17px;font-weight:700;color:var(--fg);text-align:right;font-variant-numeric:tabular-nums">${meanS}</div><div style="display:flex;height:${STRIPH}px;width:100%;border-radius:2px;overflow:hidden;border:1px solid var(--line)">${cells}</div><div style="font-family:var(--fnum);font-size:12px;font-weight:700;text-align:right;color:${passRate>=85?th.ok:passRate>=60?'var(--fg2)':th.danger};font-variant-numeric:tabular-nums">${passRate}% pass</div></div>`;
  }).join('');
  const overviewHtml=`<div style="margin-bottom:38px"><div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px"><div><div style="font-family:var(--fhead);font-size:20px;font-weight:700;letter-spacing:-.01em">Metric overview</div><div style="font-size:12.5px;color:var(--fg3);margin-top:2px">Metrics ordered by pass rate — each strip is the per-item distribution across ${scenarios.length} items (slivers ${esc(sortNote)}). Hover a metric for its definition, click it to re-sort the slivers, or click a sliver to open that item.</div></div><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:7px"><span style="font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.07em">Group</span><div style="display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:2px">${groupFilter}</div></div><div style="display:flex;align-items:center;gap:7px"><span style="font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.07em">Sort</span><div style="display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:2px;padding:2px">${sortControls}</div></div></div></div><div style="border:1px solid var(--line);border-radius:2px;overflow:hidden;background:var(--panel)">${ovRows}<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:11px 16px;border-top:1px solid var(--line);background:var(--panel2)"><span style="font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3)">Worse → better</span>${ratingLegend}</div></div></div>`;
  /* drill */
  const items=scenarios.map(s=>{
    const chips=judged.map(md=>{const m=s.metrics[md.key];return {label:md.name,title:md.name+': '+m.valStr+' ('+m.rating+')',style:{fontFamily:'var(--fnum)',fontSize:'10px',fontWeight:'700',padding:'2px 6px',borderRadius:'2px',background:ratingColor(m.rating),color:ratingTextOn(m.rating),opacity:m.failed?1:0.92,outline:m.failed?'1px solid '+th.danger:'none'}};});
    const metricDetail=defs.map(md=>buildMetricCard(s.metrics[md.key]));
    const messages=styleMessages(s.messages);
    const convLabel=spec.msg==='summ'?'Source & summary':spec.msg==='qa'?'Question & answer':'Conversation';
    return {id:s.id,pass:s.pass,diff:s.diff,searchText:s.name+' '+s.task,title:s.name,subtitle:s.task===s.name?'':s.task,chips,chipNote:s.failCount?s.failCount+' below threshold':'all metrics pass',metricCount:defs.length,metricDetail,messages,convLabel};
  });
  const drillHtml=assembleDrill(items,{title:'Per-'+spec.unit.replace(/s$/,'')+' judge trace',subtitle:'Metrics, judge reasoning, diagnostics, context and evaluator metadata on the left; the full '+(spec.msg==='summ'?'source and summary':spec.msg==='qa'?'question and answer':'conversation')+' on the right.',noun:spec.unit,chat:true,searchPlaceholder:'Search '+spec.unit+', tasks or evidence…',methodology:'Methodology — each '+spec.unit.replace(/s$/,'')+' is scored by an LLM judge ('+r.judge+') against the configured evaluators for this category. Numeric metrics use a 1–5 quality scale, fractional metrics a 0–1 scale, and safety metrics the 0–7 content-severity scale (lower is better). A '+spec.unit.replace(/s$/,'')+' fails the gate when any metric falls below its evaluator’s failure threshold. Everything shown is read straight from this scenario'+"'"+'s stored results — nothing is hard-coded to a specific evaluator or category.'});
  /* history */
  const runs=spec.runs,hKey=(defs.find(m=>m.key===S.jHistMetric)?S.jHistMetric:judged[0].key),hmd=defs.find(m=>m.key===hKey);
  const hAgg=arr=>S.jHistAgg==='mean'?arr.reduce((a,b)=>a+b,0)/arr.length:(hmd.better==='low'?Math.max(...arr):Math.min(...arr));
  const dpv=hmd.kind==='fraction'?2:1;
  const series=runs.map(rn=>{const vals=rn.lite.map(s=>s.vals[hKey]);return {run:rn.run,mn:Math.min(...vals),mx:Math.max(...vals),mean:vals.reduce((a,b)=>a+b,0)/vals.length,line:hAgg(vals),passRate:Math.round(rn.lite.filter(s=>s.pass).length/rn.lite.length*100)};});
  const modelIdx=runs.findIndex(rn=>rn.run.model==='gpt-4o');
  const histVM=runs.length<2?{empty:true,message:'This scenario has only one stored run, so there is no run-over-run history yet. Run '+spec.label+' again and this chart will track '+hmd.name+' across runs.'}:buildHistory({series,dpv,better:hmd.better,severity:hmd.kind==='severity',metricLabel:hmd.name,markerIdx:modelIdx,markerLabel:'→ gpt-4o',col2:'Pass',col2Of:s=>s.passRate+'%',hasLevels:false,
    aggLabel:S.jHistAgg==='mean'?'mean across '+scenarios.length+' '+spec.unit:'worst '+spec.unit.replace(/s$/,'')+' per run',axisNote:hmd.better==='low'?'lower is better':'higher is better',
    aggs:[['mean','Mean'],['worst','Worst '+spec.unit.replace(/s$/,'')]].map(([v,l])=>({act:'jHistAgg',val:v,label:l,on:S.jHistAgg===v})),
    metrics:judged.map(md=>({act:'jHistMetric',val:md.key,label:md.name,on:hKey===md.key})),
    subtitle:'Per-run '+hmd.name+' across the last '+runs.length+' executions. Solid line = '+(S.jHistAgg==='mean'?'mean of all '+scenarios.length+' '+spec.unit:'worst '+spec.unit.replace(/s$/,''))+'; shaded band = best–worst spread. Metric-agnostic — every metric is selectable.'});
  /* comparison */
  const cmpVM=buildJudgeComparison(spec);
  const unitCap=spec.unit.charAt(0).toUpperCase()+spec.unit.slice(1);
  return {headerTitle:spec.label,headerTag:spec.kind,demo:!!spec.demo,
    headerSubtitle:r.dataset+' · '+r.model+' · '+r.scenarios+' '+spec.unit+' · judge '+r.judge,
    runHtml:gateHtml+overviewHtml+drillHtml,history:histVM,comparison:cmpVM};
}
function buildJudgeComparison(spec){
  const S=state,th=theme(),isDark=S.mode==='dark',defs=spec.metricDefs,judged=defs.filter(m=>!m.info),runs=spec.runs,pool=spec.scenarios;
  if(runs.length<2) return {empty:true,message:'This scenario has only one stored run, so there is nothing to compare yet. Run '+spec.label+' again — each run is appended to the store — and this view will line the runs up side by side.'};
  const runOpts=runs.map(rn=>({id:rn.run.id,label:rn.run.finished.slice(0,10)+' · '+rn.run.sha}));
  const rA=runs.find(rn=>rn.run.id===S.jCmpA)||runs[0],rB=runs.find(rn=>rn.run.id===S.jCmpB)||runs[runs.length-1];
  const cKey=(defs.find(m=>m.key===S.jCmpMetric)?S.jCmpMetric:judged[0].key),cmd=defs.find(m=>m.key===cKey),cLow=cmd.better==='low';
  // Runs need not share the same scenario set (different dataset variants/sizes), so compare only the
  // items present in BOTH runs — keyed by id, guarding every lite lookup.
  const aById={},bById={};rA.lite.forEach(x=>{aById[x.id]=x;});rB.lite.forEach(x=>{bById[x.id]=x;});
  const common=pool.filter(sc=>aById[sc.id]&&bById[sc.id]);
  if(common.length===0) return {empty:true,message:'The two selected runs share no common '+spec.unit+' to line up — they were generated from different datasets. Pick two runs of the same dataset to compare.'};
  const cvals=common.flatMap(sc=>[aById[sc.id].vals[cKey],bById[sc.id].vals[cKey]]);
  let cLo=Math.min(...cvals),cHi=Math.max(...cvals);if(cmd.kind==='severity'){cLo=0;cHi=Math.max(2,cHi);}const cpad=(cHi-cLo)*0.06||0.3;cLo-=cpad;cHi+=cpad;
  const dp=v=>clamp((v-cLo)/((cHi-cLo)||1),0,1)*100;
  const eps=cmd.kind==='fraction'?0.03:cmd.kind==='severity'?0.5:0.12,cdpFmt=cmd.kind==='fraction'?2:cmd.kind==='severity'?0:1;
  const gainCol=heat(isDark?0.8:0.78);
  let data=common.map(sc=>{const av=aById[sc.id].vals[cKey],bv=bById[sc.id].vals[cKey];const delta=bv-av;const changed=Math.abs(delta)>eps;const improved=cLow?delta<0:delta>0;const sig=changed;const col=!changed?'var(--fg3)':(improved?gainCol:'var(--warn)');
    return {name:sc.name,delta,col,dotCol:ratingColor(ratingOf(cmd,bv)),aV:fmt(av,cdpFmt),bV:fmt(bv,cdpFmt),deltaS:(delta>=0?'+':'−')+fmt(Math.abs(delta),cdpFmt),sigLabel:changed?(improved?'improved':'regressed'):'n.s.',sig,improved,
      aPos:dp(av),bPos:dp(bv),connL:Math.min(dp(av),dp(bv)),connW:Math.abs(dp(bv)-dp(av))};});
  const imp=data.filter(d=>d.sig&&d.improved).length,reg=data.filter(d=>d.sig&&!d.improved).length,flat=data.length-imp-reg;
  data.sort((x,y)=>(cLow?1:-1)*(y.delta-x.delta));
  data=data.slice(0,40);
  return {subtitle:'How each '+spec.unit.replace(/s$/,'')+' moved between two runs on '+cmd.name+'. Changes beyond ±'+eps+' are flagged.',
    runOpts,cmpA:S.jCmpA,cmpB:S.jCmpB,gainCol,rowNoun:unitWord(spec),rows:data,improved:imp,regressed:reg,flat,flatLabel:'unchanged',
    metaA1:rA.run.model,metaA2:rA.run.finished.slice(0,10),metaA3:rA.run.note,metaB1:rB.run.model,metaB2:rB.run.finished.slice(0,10),metaB3:rB.run.note,
    domLo:fmt(cLo,cdpFmt),domHi:fmt(cHi,cdpFmt),
    metrics:judged.map(md=>({act:'jCmpMetric',val:md.key,label:md.name,on:S.jCmpMetric===md.key})),
    hasLevels:false,levels:[],legendNote:'teal = gain · amber = regression · grey = within ±'+eps+'. Showing up to 40 '+spec.unit+'.',
    headline:'On '+cmd.name+', '+imp+' '+spec.unit+' improved, '+reg+' regressed, and '+flat+' stayed within noise between the two runs.'};
}
function unitWord(spec){return spec.unit.charAt(0).toUpperCase()+spec.unit.slice(1).replace(/s$/,'');}

/* ============================ interactions ============================ */
function setSt(patch){Object.assign(state,patch);render();}
function applyAct(act,val){
  const S=state;
  if(act==='nav') setSt({cat:val,tab:'run',search:'',failedOnly:false,diff:'all',expanded:{},drillLimit:25});
  else if(act==='mode') setSt({mode:S.mode==='dark'?'light':'dark',modeUserSet:true});
  else if(act==='tab') setSt({tab:val});
  else if(act==='exp'){ S.expanded={...S.expanded,[val]:!S.expanded[val]}; render(); }
  else if(act==='diff') setSt({diff:val,drillLimit:25});
  else if(act==='failed') setSt({failedOnly:!S.failedOnly,drillLimit:25});
  else if(act==='more') setSt({drillLimit:S.drillLimit+25});
  else if(act==='rMetric') setSt({rMetric:val});
  else if(act==='rLevel') setSt({rLevel:val});
  else if(act==='rSort'){ if(S.rSortKey===val){setSt({rSortDir:S.rSortDir==='desc'?'asc':'desc'});}else{setSt({rSortKey:val,rSortDir:'desc'});} }
  else if(act==='rDrill') setSt({rDrillCfg:val,expanded:{},drillLimit:25});
  else if(act==='rHistMetric') setSt({rHistMetric:val});
  else if(act==='rHistLevel') setSt({rHistLevel:val});
  else if(act==='rHistAgg') setSt({rHistAgg:val});
  else if(act==='rCmpMetric') setSt({rCmpMetric:val});
  else if(act==='rCmpLevel') setSt({rCmpLevel:val});
  else if(act==='jGroup') setSt({jGroup:val});
  else if(act==='jSort'){ if(val==='__fail'){setSt({jSortKey:val,jSortDir:'desc'});}else if(val==='__name'){setSt({jSortKey:val,jSortDir:S.jSortKey===val&&S.jSortDir==='asc'?'desc':'asc'});}else{setSt({jSortKey:val,jSortDir:S.jSortKey===val&&S.jSortDir==='asc'?'desc':'asc'});} }
  else if(act==='strip'){ setSt({tab:'run',expanded:{...S.expanded,[val]:true}}); }
  else if(act==='jHistMetric') setSt({jHistMetric:val});
  else if(act==='jHistAgg') setSt({jHistAgg:val});
  else if(act==='jCmpMetric') setSt({jCmpMetric:val});
}
function wire(){
  const root=document.getElementById('app');
  root.querySelectorAll('[data-act]').forEach(el=>el.addEventListener('click',ev=>{ev.stopPropagation();applyAct(el.getAttribute('data-act'),el.getAttribute('data-val'));}));
  const dc=document.getElementById('drillCfg'); if(dc) dc.addEventListener('change',e=>setSt(state.cat==='rag'?{rDrillCfg:e.target.value,expanded:{},drillLimit:25}:{}));
  const ca=document.getElementById('cmpA'); if(ca) ca.addEventListener('change',e=>setSt(state.cat==='rag'?{rCmpA:e.target.value}:{jCmpA:e.target.value}));
  const cb=document.getElementById('cmpB'); if(cb) cb.addEventListener('change',e=>setSt(state.cat==='rag'?{rCmpB:e.target.value}:{jCmpB:e.target.value}));
  const sb=document.getElementById('drillSearch');
  if(sb){ sb.addEventListener('input',e=>{state.search=e.target.value;state.drillLimit=25;state._focus='drillSearch';render();});
    if(state._focus==='drillSearch'){sb.focus();const v=sb.value;sb.setSelectionRange(v.length,v.length);state._focus=null;} }
}
// Track live OS theme changes until the user takes manual control via the toggle.
if(window.matchMedia){const mq=window.matchMedia('(prefers-color-scheme: dark)');
  const onChange=e=>{if(!state.modeUserSet)setSt({mode:e.matches?'dark':'light'});};
  if(mq.addEventListener)mq.addEventListener('change',onChange);else if(mq.addListener)mq.addListener(onChange);}
render();
</script>
