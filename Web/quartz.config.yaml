# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: DEVBOOK
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics:
    provider: vercel
  locale: en-US
  baseUrl: devbook.zip
  ignorePatterns:
    - private
    - templates
    - .obsidian
    - Topics.base
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Schibsted Grotesk
      body: Source Sans Pro
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#f9fbf8"        # hue 80→92, imperceptible, now on-family
        lightgray: "#e3e9de"    # unchanged — was already the anchor hue
        gray: "#6a785e"         # was #7c8b70 · 3.49:1 → 4.52:1, passes AA
        darkgray: "#27301f"     # hue nudge only
        dark: "#13180f"         # hue 100→92
        secondary: "#3f6212"    # kept, 6.8:1
        tertiary: "#4d7c0f"     # was #65a30d · hover now 4.8:1 (assumption 2)
        highlight: rgba(101, 163, 13, 0.22)
        textHighlight: "#eab30855"   # yellow-500 wash (assumption 1)

      darkMode:
        light: "#161618"        # kept exactly — the bg you liked
        lightgray: "#35353a"    # was #393639 · magenta drift (hue 300) → 240
        gray: "#74747b"         # was #646464 · 3.05:1 → 3.9:1
        darkgray: "#d2d2d5"     # was #d4d4d4 · faint cool tint, on-family
        dark: "#ebebed"         # was #ebebec · same
        secondary: "#84cc16"    # kept
        tertiary: "#b3de73"     # kept from last round (calmed hover)
        highlight: rgba(132, 204, 22, 0.14)
        textHighlight: "#facc1540"   # yellow-400 @ 25%
# bottle-green:
#   '50': '#f3faf6',
#   '100': '#e2f6eb',
#   '200': '#c7ebd7',
#   '300': '#9adbb8',
#   '400': '#67c191',
#   '500': '#42a570',
#   '600': '#31885a',
#   '700': '#2a6b49',
#   '800': '#25563c',
#   '900': '#204733',
#   '950': '#123524',
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90
  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: false
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    options:
      title: Topics
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    options:
      localGraph:
        drag: false
        zoom: false
        showTags: false
      globalGraph:
        showTags: false
    layout:
      position: right
      priority: 10
      condition: not-index
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
      condition: not-index
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: false
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
    options:
      provider: giscus
      options:
        repo: grafanaKibana/devbook.zip
        repoId: myRepoID,
        category: Comments
        categoryId: myCategoryID,
        lang: en
        reactionsEnabled: false
    layout:
      position: afterBody
      priority: 10
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        Email: mailto:reshetnik.nikita@gmail.com
        LinkedIn: https://www.linkedin.com/in/nikitareshetnik/
        GitHub: https://github.com/grafanaKibana
  - source: github:quartz-community/recent-notes
    enabled: false
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - topic
        - subtopic
        - status
      excludedProperties: []
      hidePropertiesView: false
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/encrypted-pages
    enabled: true
    options:
      iterations: 600000
      passwordField: password
      unlistWhenEncrypted: false
      outputPath: static/encryptedContentIndex.json
    order: 900
    layout:
      position: body
      priority: 100
      display: all
  - source: github:quartz-community/stacked-pages
    enabled: false
    layout:
      position: afterBody
      priority: 50
      display: all
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
