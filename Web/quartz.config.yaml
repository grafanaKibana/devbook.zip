# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: DEVBOOK
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: false
  analytics:
    provider: vercel
  locale: en-US
  baseUrl: devbook.zip
  ignorePatterns:
    - private
    - templates
    - .obsidian
    - Topics.base
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Schibsted Grotesk
      body: Source Sans Pro
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#fafbf8"
        lightgray: "#e5e9de"
        gray: "#6e785e"
        darkgray: "#29301f"
        dark: "#14180f"
        secondary: "#4c8000"
        tertiary: "#3f6212"
        highlight: rgba(76, 128, 0, 0.20)
        textHighlight: "#eab30855"
      darkMode:
        light: "#161618"
        lightgray: "#35353a"
        gray: "#74747b"
        darkgray: "#d2d2d5"
        dark: "#ebebed"
        secondary: "#84cc16"
        tertiary: "#b3de73"
        highlight: rgba(132, 204, 22, 0.14)
        textHighlight: "#facc1540"
# bottle-green:
#   '50': '#f3faf6',
#   '100': '#e2f6eb',
#   '200': '#c7ebd7',
#   '300': '#9adbb8',
#   '400': '#67c191',
#   '500': '#42a570',
#   '600': '#31885a',
#   '700': '#2a6b49',
#   '800': '#25563c',
#   '900': '#204733',
#   '950': '#123524',
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90
  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: false
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/obsidian-plugin-excalidraw
    enabled: true
    options:
      darkMode: auto
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    options:
      title: Topics
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    options:
      localGraph:
        drag: false
        zoom: false
        showTags: false
      globalGraph:
        showTags: false
    layout:
      position: right
      priority: 10
      condition: not-index
  - source: github:quartz-community/search
    enabled: true
    # Enabled so it is installed + registered, but intentionally has NO `layout`
    # block: it is rendered by the custom SiteHeader (header slot), not the left
    # sidebar. See Web/quartz.ts and Web/custom/components/site-header.tsx.
    # (Disabling it un-registers the component and crashes the build.)
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
      condition: not-index
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: false
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    # Enabled (installed + registered) but no `layout`: rendered by SiteHeader.
  - source: github:quartz-community/darkmode
    enabled: true
    # Enabled (installed + registered) but no `layout`: rendered by SiteHeader.
  - source: github:quartz-community/reader-mode
    enabled: true
    # Enabled (installed + registered) but no `layout`: rendered by SiteHeader.
  - source: github:quartz-community/breadcrumbs
    enabled: true
    options:
      # Thin chevron to match the design's chevron-right separator (the plugin
      # default is a heavy "❯"). Styled --lightgray in custom.scss.
      spacerSymbol: "›"
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
    options:
      provider: giscus
      options:
        repo: grafanaKibana/devbook.zip
        repoId: myRepoID,
        category: Comments
        categoryId: myCategoryID,
        lang: en
        reactionsEnabled: false
    layout:
      position: afterBody
      priority: 10
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        Credits: /Credits
        Email: mailto:reshetnik.nikita@gmail.com
        LinkedIn: https://www.linkedin.com/in/nikitareshetnik/
        GitHub: https://github.com/grafanaKibana
  - source: github:quartz-community/recent-notes
    enabled: false
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - topic
        - subtopic
        - status
      excludedProperties: []
      hidePropertiesView: true
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/encrypted-pages
    enabled: true
    options:
      iterations: 600000
      passwordField: password
      unlistWhenEncrypted: false
      outputPath: static/encryptedContentIndex.json
    order: 900
    layout:
      position: body
      priority: 100
      display: all
  - source: github:quartz-community/stacked-pages
    enabled: false
    layout:
      position: afterBody
      priority: 50
      display: all
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
