<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sorting Visualizer — DevBook prototype</title>
  <style>
    /* Standalone page chrome — NOT ported; Quartz provides the page frame so
       the bare prototype page stays legible in both light and dark. */
    html { color-scheme: light dark; }
    body {
      background: #fafbf8;
      color: #14180f;
      margin: 1.5rem 1rem;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    @media (prefers-color-scheme: dark) { body { background: #161618; color: #ebebed; } }

    /* ------------------------------------------------------------------ *
     * Theme bridge.
     * The widget reads Quartz's palette when present (var(--secondary) …)
     * and falls back to DevBook's own values so it also looks right on a
     * bare page. Semantic state hues (amber / violet / blue) are not part
     * of Quartz, so they are declared here and swapped for dark mode via
     * both prefers-color-scheme (bare page) and Quartz's saved-theme attr.
     * ------------------------------------------------------------------ */
    .algviz {
      --az-page:    var(--light,     #fafbf8);
      --az-surface: var(--lightgray, #e5e9de);
      --az-muted:   var(--gray,      #6e785e);
      --az-text:    var(--darkgray,  #29301f);
      --az-strong:  var(--dark,      #14180f);
      --az-accent:  var(--secondary, #4c8000);

      --az-bar:       #9aa886;               /* default / unsorted bar     */
      --az-compare:   #d97706;               /* C — being compared (amber) */
      --az-write:     #7c3aed;               /* S/W — swap or shift (violet)*/
      --az-key:       #2563eb;               /* K — held key / current min  */
      --az-sorted:    var(--secondary, #4c8000); /* ✓ — in final position   */

      --az-tween: 300ms;                     /* set from JS; 0 when reduced */
      color: var(--az-text);
      font-family: var(--bodyFont, system-ui, -apple-system, "Segoe UI", sans-serif);
      display: block;
      max-width: 760px;
      margin: 0 auto;
    }

    /* Dark palette — applied for a bare page (OS preference) … */
    @media (prefers-color-scheme: dark) {
      .algviz {
        --az-page:    var(--light,     #161618);
        --az-surface: var(--lightgray, #35353a);
        --az-muted:   var(--gray,      #74747b);
        --az-text:    var(--darkgray,  #d2d2d5);
        --az-strong:  var(--dark,      #ebebed);
        --az-accent:  var(--secondary, #84cc16);
        --az-bar:     #6b7566;
        --az-compare: #f59e0b;
        --az-write:   #a78bfa;
        --az-key:     #60a5fa;
        --az-sorted:  var(--secondary, #84cc16);
      }
    }
    /* … and for Quartz's explicit dark toggle, which wins inside the site. */
    :root[saved-theme="dark"] .algviz {
      --az-bar:     #6b7566;
      --az-compare: #f59e0b;
      --az-write:   #a78bfa;
      --az-key:     #60a5fa;
    }

    .algviz *,
    .algviz *::before,
    .algviz *::after { box-sizing: border-box; }

    .algviz-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem 1rem;
      margin-bottom: 0.75rem;
    }
    .algviz-title { font-size: 1.1rem; font-weight: 700; color: var(--az-strong); margin: 0; }
    .algviz-sub { font-size: 0.85rem; color: var(--az-muted); margin: 0; }

    /* Bars ------------------------------------------------------------- */
    .algviz-stage {
      background: var(--az-surface);
      border-radius: 0.6rem;
      padding: 1rem 0.9rem 0.6rem;
    }
    .algviz-bars {
      display: flex;
      align-items: flex-end;
      gap: clamp(0.15rem, 1.2vw, 0.5rem);
      height: 15rem;
    }
    .algviz-cell {
      flex: 1 1 0;
      min-width: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 0.3rem;
    }
    .algviz-bar {
      position: relative;
      width: 100%;
      background: var(--az-bar);
      border-radius: 0.25rem 0.25rem 0 0;
      transition: height var(--az-tween) ease, background-color 0.2s ease;
      min-height: 4px;
    }
    .algviz-cap {
      position: absolute;
      top: -1.35rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      font-weight: 700;
      line-height: 1;
      color: var(--az-strong);
      opacity: 0;
    }
    .algviz-bar-value {
      font-size: clamp(0.6rem, 2vw, 0.82rem);
      color: var(--az-muted);
      font-variant-numeric: tabular-nums;
    }

    .algviz-bar.is-compare  { background: var(--az-compare); }
    .algviz-bar.is-swap,
    .algviz-bar.is-overwrite { background: var(--az-write); }
    .algviz-bar.is-select    { outline: 3px solid var(--az-key); outline-offset: 1px; }
    .algviz-bar.is-sorted    { background: var(--az-sorted); }
    .algviz-cell.is-active .algviz-bar-value { color: var(--az-strong); font-weight: 700; }
    .algviz-bar.is-compare  .algviz-cap,
    .algviz-bar.is-swap     .algviz-cap,
    .algviz-bar.is-overwrite .algviz-cap,
    .algviz-bar.is-select   .algviz-cap,
    .algviz-bar.is-sorted   .algviz-cap { opacity: 1; }

    /* Status line ------------------------------------------------------ */
    .algviz-status {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 1rem;
      margin: 0.7rem 0;
      font-size: 0.85rem;
    }
    .algviz-step { font-weight: 700; color: var(--az-strong); font-variant-numeric: tabular-nums; }
    .algviz-stats { color: var(--az-muted); font-variant-numeric: tabular-nums; }
    .algviz-key {
      color: var(--az-key);
      font-weight: 700;
      min-width: 3.5rem;
    }
    .algviz-live {
      flex: 1 1 100%;
      min-height: 1.4em;
      color: var(--az-text);
      background: var(--az-surface);
      border-left: 3px solid var(--az-accent);
      padding: 0.4rem 0.6rem;
      border-radius: 0 0.35rem 0.35rem 0;
    }

    /* Toolbar ---------------------------------------------------------- */
    .algviz-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem 0.6rem;
    }
    .algviz-toolbar .group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .algviz button,
    .algviz select {
      font: inherit;
      font-size: 0.85rem;
      color: var(--az-strong);
      background: var(--az-page);
      border: 1px solid var(--az-muted);
      border-radius: 0.4rem;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
    }
    .algviz button:hover,
    .algviz select:hover { border-color: var(--az-accent); }
    .algviz button.primary {
      background: var(--az-accent);
      border-color: var(--az-accent);
      color: var(--az-page);
      font-weight: 700;
      min-width: 5.2rem;
    }
    .algviz button:disabled { opacity: 0.45; cursor: not-allowed; }
    .algviz label { font-size: 0.82rem; color: var(--az-muted); }
    .algviz input[type="range"] { accent-color: var(--az-accent); vertical-align: middle; }
    .algviz :focus-visible {
      outline: 2px solid var(--az-key);
      outline-offset: 2px;
    }

    /* Legend ----------------------------------------------------------- */
    .algviz-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.9rem;
      margin-top: 0.8rem;
      font-size: 0.78rem;
      color: var(--az-muted);
    }
    .algviz-legend span { display: inline-flex; align-items: center; gap: 0.35rem; }
    .algviz-swatch {
      width: 0.85rem; height: 0.85rem; border-radius: 0.2rem;
      display: inline-block; flex: none;
    }
    .algviz-swatch.sw-bar     { background: var(--az-bar); }
    .algviz-swatch.sw-compare { background: var(--az-compare); }
    .algviz-swatch.sw-write   { background: var(--az-write); }
    .algviz-swatch.sw-key     { background: transparent; outline: 3px solid var(--az-key); outline-offset: -3px; }
    .algviz-swatch.sw-sorted  { background: var(--az-sorted); }

    /* Reduced motion — mirror site-marquee.tsx: no transitions, jump. */
    @media (prefers-reduced-motion: reduce) {
      .algviz *,
      .algviz *::before,
      .algviz *::after {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <!-- Mount point. In Quartz this whole <div data-algviz> is what the
       afterDOMLoaded script finds via querySelectorAll('[data-algviz]').
       The JSON marker mirrors what a future transformer would extract from
       an in-note fenced ```algviz block. -->
  <div class="algviz" data-algviz>
    <script type="application/json" class="algviz-config">
      { "algorithm": "bubble-sort", "array": [24, 8, 61, 37, 15, 88, 42, 5, 73, 29, 56, 19], "speed": 1 }
    </script>
  </div>

  <script type="module">
    /* ================================================================== *
     * ENGINE — buildFrames(input) -> Frame[]                             *
     *                                                                    *
     * Pure. Runs the named algorithm ONCE and emits an ordered list of   *
     * immutable step frames. No DOM. This is the piece that ports to     *
     * Quartz untouched. Each frame carries a full array snapshot so       *
     * step-back is free and render() stays stateless.                    *
     *                                                                    *
     * Frame = {                                                          *
     *   type: 'init'|'compare'|'swap'|'overwrite'|'select'               *
     *        |'mark-sorted'|'done',                                      *
     *   array: number[],        // snapshot AFTER this step              *
     *   sorted: number[],       // indices locked into final position    *
     *   active: number[],       // indices this step acts on             *
     *   candidate: number|null, // current key / running minimum         *
     *   keyValue: number|null,  // held key value (insertion)            *
     *   comparisons, swaps: number,                                      *
     *   message: string         // spoken via aria-live                  *
     * }                                                                  *
     * ================================================================== */

    function bubbleSortFrames(a) {
      const frames = [];
      const sorted = new Set();
      let comparisons = 0, swaps = 0;
      const snap = (type, active, message, extra = {}) => frames.push({
        type, array: a.slice(), sorted: [...sorted],
        active: active || [], candidate: null, keyValue: null,
        comparisons, swaps, message, ...extra,
      });

      snap("init", [], `Initial array of ${a.length} values. Bubble sort walks adjacent pairs, bubbling the largest to the end each pass.`);
      const n = a.length;
      for (let i = 0; i < n - 1; i++) {
        let swapped = false;
        for (let j = 0; j < n - 1 - i; j++) {
          comparisons++;
          snap("compare", [j, j + 1], `Compare index ${j} (${a[j]}) and index ${j + 1} (${a[j + 1]}).`);
          if (a[j] > a[j + 1]) {
            const x = a[j], y = a[j + 1];
            [a[j], a[j + 1]] = [a[j + 1], a[j]];
            swaps++;
            snap("swap", [j, j + 1], `${x} > ${y}: swap indices ${j} and ${j + 1}.`);
            swapped = true;
          }
        }
        sorted.add(n - 1 - i);
        snap("mark-sorted", [n - 1 - i], `Pass complete: index ${n - 1 - i} now holds its final value.`);
        if (!swapped) {
          for (let k = 0; k <= n - 2 - i; k++) sorted.add(k);
          snap("mark-sorted", [], `A full pass made no swaps — the array is already sorted, so we stop early.`);
          break;
        }
      }
      sorted.add(0);
      snap("done", [], `Done. ${comparisons} comparisons, ${swaps} swaps.`);
      return frames;
    }

    function insertionSortFrames(a) {
      const frames = [];
      const sorted = new Set();
      let comparisons = 0, shifts = 0;
      const snap = (type, active, message, extra = {}) => frames.push({
        type, array: a.slice(), sorted: [...sorted],
        active: active || [], candidate: null, keyValue: null,
        comparisons, swaps: shifts, message, ...extra,
      });

      snap("init", [], `Initial array. Insertion sort grows a sorted prefix on the left, inserting each new value into place.`);
      const n = a.length;
      sorted.add(0);
      snap("mark-sorted", [0], `Index 0 on its own is a trivially sorted prefix.`);
      for (let i = 1; i < n; i++) {
        const key = a[i];
        snap("select", [i], `Take the key ${key} from index ${i} to insert into the sorted prefix.`, { candidate: i, keyValue: key });
        let j = i - 1;
        while (j >= 0) {
          comparisons++;
          if (a[j] > key) {
            snap("compare", [j], `Compare key ${key} with index ${j} (${a[j]}): ${a[j]} > ${key}, so it must shift right.`, { keyValue: key });
            a[j + 1] = a[j];
            shifts++;
            snap("overwrite", [j + 1], `Shift ${a[j]} from index ${j} into index ${j + 1}.`, { keyValue: key });
            j--;
          } else {
            snap("compare", [j], `Compare key ${key} with index ${j} (${a[j]}): ${a[j]} ≤ ${key}, insertion point found.`, { keyValue: key });
            break;
          }
        }
        a[j + 1] = key;
        snap("overwrite", [j + 1], `Place the key ${key} at index ${j + 1}.`, { keyValue: key });
        for (let k = 0; k <= i; k++) sorted.add(k);
        snap("mark-sorted", [i], `Sorted prefix now spans indices 0…${i}.`);
      }
      snap("done", [], `Done. ${comparisons} comparisons, ${shifts} shifts.`);
      return frames;
    }

    function selectionSortFrames(a) {
      const frames = [];
      const sorted = new Set();
      let comparisons = 0, swaps = 0;
      const snap = (type, active, message, extra = {}) => frames.push({
        type, array: a.slice(), sorted: [...sorted],
        active: active || [], candidate: null, keyValue: null,
        comparisons, swaps, message, ...extra,
      });

      snap("init", [], `Initial array. Selection sort scans the unsorted part for its minimum, then does one swap per pass.`);
      const n = a.length;
      for (let i = 0; i < n - 1; i++) {
        let minIdx = i;
        snap("select", [i], `Pass ${i + 1}: assume index ${i} (${a[i]}) is the minimum of the unsorted part.`, { candidate: minIdx });
        for (let j = i + 1; j < n; j++) {
          comparisons++;
          snap("compare", [j], `Compare index ${j} (${a[j]}) against the running minimum at index ${minIdx} (${a[minIdx]}).`, { candidate: minIdx });
          if (a[j] < a[minIdx]) {
            minIdx = j;
            snap("select", [minIdx], `New minimum: index ${minIdx} (${a[minIdx]}).`, { candidate: minIdx });
          }
        }
        if (minIdx !== i) {
          const x = a[i], y = a[minIdx];
          [a[i], a[minIdx]] = [a[minIdx], a[i]];
          swaps++;
          snap("swap", [i, minIdx], `Swap the minimum ${y} into index ${i}, moving ${x} out to index ${minIdx}.`);
        } else {
          snap("select", [i], `Index ${i} already holds the minimum — no swap needed.`, { candidate: i });
        }
        sorted.add(i);
        snap("mark-sorted", [i], `Index ${i} is now locked in its final sorted position.`);
      }
      sorted.add(n - 1);
      snap("mark-sorted", [n - 1], `Index ${n - 1} is the last remaining value — sorted by elimination.`);
      snap("done", [], `Done. ${comparisons} comparisons, ${swaps} swaps.`);
      return frames;
    }

    const ALGORITHMS = {
      "bubble-sort": { label: "Bubble sort", build: bubbleSortFrames, move: "swaps" },
      "insertion-sort": { label: "Insertion sort", build: insertionSortFrames, move: "shifts" },
      "selection-sort": { label: "Selection sort", build: selectionSortFrames, move: "swaps" },
    };

    function buildFrames(input) {
      const algo = ALGORITHMS[input.algorithm] || ALGORITHMS["bubble-sort"];
      const array = (Array.isArray(input.array) && input.array.length)
        ? input.array.slice()
        : randomArray();
      return algo.build(array);
    }

    function randomArray(n = 12) {
      // Distinct-ish heights: a shuffled spread of values across [8, 96].
      const step = Math.floor(88 / n);
      const base = Array.from({ length: n }, (_, i) => 8 + i * step + Math.floor(Math.random() * step));
      for (let i = base.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [base[i], base[j]] = [base[j], base[i]];
      }
      return base;
    }

    /* ================================================================== *
     * TRANSPORT — Player indexes into precomputed frames.                *
     * ================================================================== */
    class Player {
      constructor(total, onFrame) {
        this.total = total;
        this.onFrame = onFrame;
        this.i = 0;
        this.speed = 1;
        this.playing = false;
        this.timer = null;
        this.base = 700; // ms per step at 1x
        this.onState = null;
      }
      interval() { return this.base / this.speed; }
      emit() { this.onFrame(this.i); this.onState && this.onState(); }
      set(i) { this.i = Math.max(0, Math.min(this.total - 1, i)); this.emit(); }
      next() { if (this.i < this.total - 1) this.set(this.i + 1); else this.pause(); }
      prev() { this.pause(); this.set(this.i - 1); }
      reset() { this.pause(); this.set(0); }
      play() {
        if (this.playing) return;
        if (this.i >= this.total - 1) this.set(0);
        this.playing = true;
        this.onState && this.onState();
        this.tick();
      }
      pause() {
        this.playing = false;
        clearTimeout(this.timer);
        this.onState && this.onState();
      }
      toggle() { this.playing ? this.pause() : this.play(); }
      tick() {
        if (!this.playing) return;
        if (this.i >= this.total - 1) { this.pause(); return; }
        this.set(this.i + 1);
        this.timer = setTimeout(() => this.tick(), this.interval());
      }
    }

    /* ================================================================== *
     * MOUNT — build UI inside [data-algviz] and wire the transport.      *
     * (This same function is what the Quartz afterDOMLoaded hook runs.)  *
     * ================================================================== */
    const CAP = { compare: "C", swap: "S", overwrite: "W", select: "K", "mark-sorted": "✓" };
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

    function mount(root) {
      let config = {};
      const marker = root.querySelector(".algviz-config");
      if (marker) { try { config = JSON.parse(marker.textContent); } catch (e) { console.error("algviz: bad config JSON", e); } }

      let algorithm = ALGORITHMS[config.algorithm] ? config.algorithm : "bubble-sort";
      let data = (Array.isArray(config.array) && config.array.length) ? config.array.slice() : randomArray();
      let speed = Number(config.speed) > 0 ? Number(config.speed) : 1;
      const algoId = uid("algo"), speedId = uid("speed");

      root.innerHTML = `
        <div class="algviz-head">
          <div>
            <p class="algviz-title">Sorting visualizer</p>
            <p class="algviz-sub" data-algo-name></p>
          </div>
        </div>
        <div class="algviz-stage"><div class="algviz-bars" role="img" aria-label="Array being sorted"></div></div>
        <div class="algviz-status">
          <span class="algviz-step" data-step></span>
          <span class="algviz-stats" data-stats></span>
          <span class="algviz-key" data-key></span>
          <p class="algviz-live" data-live aria-live="polite"></p>
        </div>
        <div class="algviz-toolbar">
          <div class="group">
            <button class="primary" data-play aria-label="Play"></button>
            <button data-prev aria-label="Step backward">◀ Step</button>
            <button data-next aria-label="Step forward">Step ▶</button>
            <button data-reset aria-label="Reset to start">Reset</button>
          </div>
          <div class="group">
            <label for="${algoId}">Algorithm</label>
            <select id="${algoId}" data-algo aria-label="Algorithm">
              <option value="bubble-sort">Bubble sort</option>
              <option value="insertion-sort">Insertion sort</option>
              <option value="selection-sort">Selection sort</option>
            </select>
          </div>
          <div class="group">
            <label for="${speedId}">Speed</label>
            <input id="${speedId}" data-speed type="range" min="0.25" max="4" step="0.25" aria-label="Playback speed" />
            <span data-speed-label aria-hidden="true"></span>
          </div>
          <div class="group">
            <button data-shuffle aria-label="Shuffle and generate a new array">Shuffle</button>
          </div>
        </div>
        <div class="algviz-legend" aria-hidden="true">
          <span><i class="algviz-swatch sw-bar"></i>unsorted</span>
          <span><i class="algviz-swatch sw-compare"></i>C — comparing</span>
          <span><i class="algviz-swatch sw-write"></i>S/W — swap or shift</span>
          <span><i class="algviz-swatch sw-key"></i>K — key / current min</span>
          <span><i class="algviz-swatch sw-sorted"></i>✓ — sorted</span>
        </div>`;

      const el = {
        algoName: root.querySelector("[data-algo-name]"),
        bars: root.querySelector(".algviz-bars"),
        step: root.querySelector("[data-step]"),
        stats: root.querySelector("[data-stats]"),
        key: root.querySelector("[data-key]"),
        live: root.querySelector("[data-live]"),
        play: root.querySelector("[data-play]"),
        prev: root.querySelector("[data-prev]"),
        next: root.querySelector("[data-next]"),
        reset: root.querySelector("[data-reset]"),
        algo: root.querySelector("[data-algo]"),
        speed: root.querySelector("[data-speed]"),
        speedLabel: root.querySelector("[data-speed-label]"),
        shuffle: root.querySelector("[data-shuffle]"),
      };

      let frames = [];
      let cells = [];
      let player = null;
      let maxVal = 1;

      function buildBars() {
        el.bars.innerHTML = "";
        cells = data.map((v) => {
          const cell = document.createElement("div");
          cell.className = "algviz-cell";
          const bar = document.createElement("div");
          bar.className = "algviz-bar";
          const cap = document.createElement("span");
          cap.className = "algviz-cap";
          bar.appendChild(cap);
          const val = document.createElement("div");
          val.className = "algviz-bar-value";
          val.textContent = v;
          cell.appendChild(bar);
          cell.appendChild(val);
          el.bars.appendChild(cell);
          return { cell, bar, cap, val };
        });
      }

      function scale(v) { return (12 + 88 * (v / maxVal)).toFixed(2) + "%"; }

      function render(index) {
        const f = frames[index];
        for (let p = 0; p < cells.length; p++) {
          const c = cells[p];
          const v = f.array[p];
          c.bar.style.height = scale(v);
          c.val.textContent = v;
          c.bar.className = "algviz-bar";
          c.cell.classList.remove("is-active");
          let cap = "";
          if (f.sorted.includes(p)) { c.bar.classList.add("is-sorted"); cap = CAP["mark-sorted"]; }
          if (f.candidate === p) { c.bar.classList.add("is-select"); cap = CAP.select; }
          if (f.active.includes(p)) {
            c.bar.classList.add("is-" + f.type);
            c.cell.classList.add("is-active");
            if (CAP[f.type]) cap = CAP[f.type];
          }
          c.cap.textContent = cap;
        }
        const move = ALGORITHMS[algorithm].move;
        el.step.textContent = `Step ${index} / ${frames.length - 1}`;
        el.stats.textContent = `${f.comparisons} comparisons · ${f.swaps} ${move}`;
        el.key.textContent = f.keyValue != null ? `key ${f.keyValue}` : "";
        el.live.textContent = f.message;
      }

      function syncControls() {
        const atEnd = player.i >= frames.length - 1;
        el.play.textContent = player.playing ? "⏸ Pause" : (atEnd ? "↻ Replay" : "▶ Play");
        el.play.setAttribute("aria-label", player.playing ? "Pause" : (atEnd ? "Replay" : "Play"));
        el.prev.disabled = player.i <= 0;
        el.next.disabled = atEnd;
      }

      function applyTween() {
        const ms = reduceMotion.matches ? 0 : Math.min(player.interval() * 0.5, 320);
        root.style.setProperty("--az-tween", ms + "ms");
      }

      function rebuild({ newData } = {}) {
        if (newData) { data = newData; maxVal = Math.max(...data); buildBars(); }
        frames = buildFrames({ algorithm, array: data });
        el.algoName.textContent = `${ALGORITHMS[algorithm].label} · ${data.length} values`;
        player = new Player(frames.length, render);
        player.speed = speed;
        player.onState = () => { syncControls(); applyTween(); };
        player.set(0);
        applyTween();
      }

      // Initial data + bars.
      maxVal = Math.max(...data);
      buildBars();
      rebuild();
      el.algo.value = algorithm;
      el.speed.value = String(speed);
      el.speedLabel.textContent = speed.toFixed(2) + "×";

      // Wiring.
      el.play.addEventListener("click", () => player.toggle());
      el.next.addEventListener("click", () => { player.pause(); player.next(); });
      el.prev.addEventListener("click", () => player.prev());
      el.reset.addEventListener("click", () => player.reset());
      el.shuffle.addEventListener("click", () => rebuild({ newData: randomArray(data.length) }));
      el.algo.addEventListener("change", () => { algorithm = el.algo.value; rebuild(); });
      el.speed.addEventListener("input", () => {
        speed = Number(el.speed.value);
        el.speedLabel.textContent = speed.toFixed(2) + "×";
        player.speed = speed;
        applyTween();
      });

      // Keyboard: Space toggles, ←/→ step. Let native controls keep arrows.
      root.addEventListener("keydown", (e) => {
        const t = e.target;
        const isField = t.matches && t.matches("input, select");
        if ((e.key === " " || e.code === "Space") && t.tagName !== "BUTTON") { e.preventDefault(); player.toggle(); }
        else if (e.key === "ArrowRight" && !isField) { e.preventDefault(); player.pause(); player.next(); }
        else if (e.key === "ArrowLeft" && !isField) { e.preventDefault(); player.prev(); }
      });

      reduceMotion.addEventListener?.("change", applyTween);
    }

    let _n = 0;
    function uid(p) { return `algviz-${p}-${_n++}`; }

    document.querySelectorAll("[data-algviz]").forEach(mount);
  </script>
</body>
</html>
